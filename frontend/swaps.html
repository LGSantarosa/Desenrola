<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trocas — desenrola!</title>
  <link rel="icon" type="image/png" href="assets/images/camaleon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/swaps.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <div class="nav-left">
        <a href="dashboard.html" class="nav-logo">
          <img src="assets/images/camaleon.png" alt="desenrola!">
        </a>
        <input type="text" class="nav-search" id="nav-search" placeholder="Buscar pessoas...">
      </div>
      <div class="nav-tabs">
        <a href="dashboard.html" class="nav-tab" title="Feed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <a href="swaps.html" class="nav-tab active" title="Trocas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </a>
        <a href="profile.html" class="nav-tab" title="Perfil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      </div>
      <div class="nav-right">
        <div class="nav-user" id="nav-user"></div>
        <button class="nav-logout" id="logout-btn" title="Sair">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <div class="dashboard">
    <div class="dashboard-container">

      <div class="dashboard-header">
        <h1>Minhas trocas</h1>
        <p>Gerencie suas solicitacoes de troca.</p>
      </div>

      <div class="tabs">
        <button class="tab active" data-tab="received">Recebidas</button>
        <button class="tab" data-tab="sent">Enviadas</button>
      </div>

      <div class="tab-content active" id="tab-received"></div>
      <div class="tab-content" id="tab-sent"></div>

    </div>
  </div>

  <script src="js/validation.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/swaps.js"></script>
</body>
</html>
