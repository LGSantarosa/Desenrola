<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurar perfil — desenrola!</title>
  <link rel="icon" type="image/png" href="/static/assets/images/camaleon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="stylesheet" href="/static/css/onboarding.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <div class="nav-left">
        <a href="/dashboard" class="nav-logo">
          <img src="/static/assets/images/camaleon.png" alt="desenrola!">
        </a>
      </div>
      <div class="nav-right">
        <div class="nav-user" id="nav-user"></div>
      </div>
    </div>
  </nav>

  <div class="page-content">
    <div class="onboarding-card">

      <div class="step" id="step-1">
        <h1>Foto de perfil</h1>
        <p class="subtitle">Opcional, mas ajuda as pessoas a te reconhecerem.</p>

        <div class="avatar-upload" id="avatar-area">
          <div class="avatar-preview" id="avatar-preview">
            <span id="avatar-initials"></span>
          </div>
          <input type="file" id="avatar-input" accept="image/*" hidden>
          <button type="button" class="btn btn-outline" id="avatar-btn">Escolher foto</button>
          <span class="hint">JPG ou PNG, max 2MB</span>
        </div>

        <div class="step-actions">
          <button class="btn btn-green btn-full" id="next-1">Continuar</button>
          <button class="btn-skip" id="skip-1">Pular</button>
        </div>
      </div>

      <div class="step hidden" id="step-2">
        <h1>O que voce <span class="text-green">ensina</span>?</h1>
        <p class="subtitle">Selecione as habilidades que voce pode ensinar.</p>

        <div class="categories-list" id="teaches-list"></div>

        <div class="selected-skills" id="teaches-selected"></div>

        <div class="step-actions">
          <button class="btn btn-green btn-full" id="next-2" disabled>Continuar</button>
        </div>
      </div>

      <div class="step hidden" id="step-3">
        <h1>O que voce quer <span class="text-orange">aprender</span>?</h1>
        <p class="subtitle">Selecione as habilidades que voce quer aprender.</p>

        <div class="categories-list" id="learns-list"></div>

        <div class="selected-skills" id="learns-selected"></div>

        <div class="step-actions">
          <button class="btn btn-green btn-full" id="finish-btn" disabled>Finalizar</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/js/validation.js"></script>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/onboarding.js"></script>
</body>
</html>
