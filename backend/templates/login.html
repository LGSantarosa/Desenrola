<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — desenrola!</title>
  <link rel="icon" type="image/png" href="/static/assets/images/camaleon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>

  <nav>
    <div class="container nav-inner">
      <a href="/" class="nav-logo">
        <img src="/static/assets/images/logo.png" alt="desenrola!">
      </a>
      <div class="nav-links">
        <a href="/register">Criar conta</a>
      </div>
    </div>
  </nav>

  <div class="page-content">
    <div class="form-card">
      <h1>Entrar</h1>
      <p class="subtitle">Acesse sua conta pra continuar trocando habilidades.</p>

      <div class="alert alert-error" id="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label>E-mail <span class="required">*</span></label>
          <input type="email" id="email" placeholder="Seu e-mail cadastrado" required>
          <span class="hint">O e-mail que voce usou no cadastro</span>
          <span class="error-msg">E-mail invalido</span>
        </div>

        <div class="form-group">
          <label>Senha <span class="required">*</span></label>
          <input type="password" id="password" placeholder="Sua senha" required>
          <span class="hint">A senha da sua conta</span>
          <span class="error-msg">Preencha a senha</span>
        </div>

        <div class="form-footer">
          <button type="submit" class="btn btn-green btn-full" id="submit-btn" disabled>Entrar</button>
          <p class="link">Nao tem conta? <a href="/register">Criar conta</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/validation.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
