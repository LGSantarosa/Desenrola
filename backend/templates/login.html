<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — desenrola!</title>
  <link rel="icon" type="image/png" href="/static/assets/images/camaleon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css?v=3">
</head>
<body>

  <nav>
    <div class="container nav-inner">
      <a href="/" class="nav-logo">
        <img src="/static/assets/images/logo.png" alt="desenrola!">
      </a>
      <div class="nav-links">
        <a href="/register">Ja tenho conta</a>
      </div>
    </div>
  </nav>

  <div class="page-content">
    <div class="form-card">
      <h1>Entrar</h1>
      <p class="subtitle">Acesse sua conta pra continuar trocando habilidades.</p>

      {% if error %}
      <div class="alert alert-error" style="display:block">{{ error }}</div>
      {% endif %}

      <form method="POST" action="/auth/login" novalidate>
        <div class="form-group">
          <label>E-mail <span class="required">*</span></label>
          <input type="email" name="email" id="email" value="{{ form.email or '' }}" placeholder="Seu e-mail cadastrado" required>
          <span class="hint">O e-mail que voce usou no cadastro</span>
          <span class="error-msg">E-mail invalido</span>
        </div>

        <div class="form-group">
          <label>Senha <span class="required">*</span></label>
          <div class="password-wrapper">
            <input type="password" name="password" id="password" placeholder="Sua senha" required>
            <button type="button" class="password-toggle" data-target="password" aria-label="Mostrar senha">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <span class="hint">A senha da sua conta</span>
          <span class="error-msg">Preencha a senha</span>
        </div>

        <div class="form-footer">
          <button type="submit" class="btn btn-green btn-full">Entrar</button>
          <p class="link">Nao tem conta? <a href="/register">Criar conta</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/validation.js?v=3"></script>
  <script src="/static/js/login.js?v=3"></script>
</body>
</html>

<!-- Front — tela de login (form POST /auth/login) -->
